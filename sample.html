<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger UI</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
        }
        .messenger-container {
            display: flex;
            width: 100%;
            height: 100%;
        }
        .sidebar {
            width: 30%;
            background: #f2f2f2;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .profile-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .profile-pic {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: gray;
        }
        .edit-icon {
            cursor: pointer;
        }
        .messages-section {
            margin-top: 20px;
        }
        .chat-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
        }
        .chat-placeholder {
            text-align: center;
        }
        .messenger-icon {
            font-size: 50px;
        }
        .send-message-btn {
            background: #0095f6;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
        }
        .send-message-btn:hover {
            background: #0077cc;
        }
    </style>
</head>
<body>
    <div class="messenger-container">
        <div class="sidebar">
            <div class="profile-section">
                <div class="profile-pic"></div>
                <div class="profile-name">ishw.arya3343</div>
                <i class="fas fa-edit edit-icon"></i>
            </div>
            <div class="messages-section">
                <h4>Messages</h4>
                <p>No messages found.</p>
            </div>
        </div>
        <div class="chat-area">
            <div class="chat-placeholder">
                <i class="fab fa-facebook-messenger messenger-icon"></i>
                <h2>Your messages</h2>
                <p>Send a message to start a chat.</p>
                <button class="send-message-btn">Send message</button>
            </div>
        </div>
    </div>
</body>
</html>
